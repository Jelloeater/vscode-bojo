name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npm run compile

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npx mocha out/test/cycler.test.js

  package:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run vscode:prepublish

      - name: Package extension
        run: |
          npm install -g @vscode/vsce
          vsce package --no-git-tag-version

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vscode-bojo
          path: vscode-bojo-*.vsix
